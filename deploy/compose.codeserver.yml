# HelixCode stack — Caddy edge (52443/52080 on 0.0.0.0) -> code-server.
# Project bind-mounts are injected by up.sh into compose.projects.yml ($PROJECTS).
services:
  code-server:
    image: docker.io/codercom/code-server:latest
    # Rootless podman: run as container-root, which maps to the host user, so the
    # bind-mounted host Projects (host-user-owned, 0750) are readable AND writable
    # in the browser — "permissive perms, immediate work". (keep-id conflicts with
    # podman-compose's shared pod; running as root maps to the host user cleanly.)
    # HOME pinned to /home/coder so code-server config persists to the cs-config volume.
    user: "0:0"
    environment:
      - PASSWORD=${CODE_SERVER_PASSWORD}
      - HOME=/home/coder
    expose:
      - "8080"
    volumes:
      - cs-config:/home/coder/.config
    restart: unless-stopped
  caddy:
    image: docker.io/library/caddy:2
    # DNS-01 secret passthrough (TLS_MODE=letsencrypt* with ACME_DNS_PROVIDER).
    # The token lives ONLY in the git-ignored .env and is read by Caddy via
    # {env.ACME_DNS_API_TOKEN} — it is NEVER written into the tracked Caddyfile
    # (§11.4.10). Empty/unused for self-signed and non-DNS ACME modes. NB: DNS-01
    # also needs a Caddy image built WITH that DNS provider plugin (stock caddy:2
    # has none) — see docs/guides/TLS.md.
    environment:
      - ACME_DNS_API_TOKEN=${ACME_DNS_API_TOKEN:-}
    ports:
      - "0.0.0.0:52443:443"
      - "0.0.0.0:52080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:Z
      - ./tls:/etc/caddy/tls:Z
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - code-server
    restart: unless-stopped
volumes:
  cs-config:
  cs-data:
  caddy-data:
  caddy-config:
