# HelixCode — raise inotify limits so code-server can watch large project trees
# without "unable to watch for file changes" (ENOSPC). inotify limits are a
# host-kernel, per-UID resource (not namespaced), so this is set on the host.
# Applied by scripts/tune-host.sh (installs to /etc/sysctl.d/, needs root).
fs.inotify.max_user_watches = 1048576
fs.inotify.max_user_instances = 1024
fs.inotify.max_queued_events = 65536
